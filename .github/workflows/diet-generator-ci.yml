name: Diet Generator CI

on:
  push:
    paths:
      - 'api/src/models/catFood.ts'
      - 'api/src/repositories/catFoodRepo.ts'
      - 'api/src/repositories/catFoodRepo.test.ts'
      - 'api/src/routes/diet.ts'
      - 'api/database/migrations/003_cat_food_products.sql'
      - 'api/database/seed/005_cat_food_products.sql'
      - 'frontend/src/components/entity/diet/**'
      - 'frontend/src/api/config.ts'
      - '.github/workflows/diet-generator-ci.yml'
  pull_request:
    paths:
      - 'api/src/models/catFood.ts'
      - 'api/src/repositories/catFoodRepo.ts'
      - 'api/src/repositories/catFoodRepo.test.ts'
      - 'api/src/routes/diet.ts'
      - 'api/database/migrations/003_cat_food_products.sql'
      - 'api/database/seed/005_cat_food_products.sql'
      - 'frontend/src/components/entity/diet/**'
      - 'frontend/src/api/config.ts'
      - '.github/workflows/diet-generator-ci.yml'

jobs:
  # ── Job 1: Lint API ──────────────────────────────────────────────────────
  lint-api:
    name: Lint API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── Job 2: Lint Frontend ─────────────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── Job 3: Unit tests for API (catFoodRepo) ──────────────────────────────
  test-api:
    name: API Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --reporter=verbose

  # ── Job 4: Build API (TypeScript) ────────────────────────────────────────
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: [lint-api, test-api]
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: api/dist/
          retention-days: 7

  # ── Job 5: Build Frontend (TypeScript + Vite) ────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
